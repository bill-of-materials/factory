name: validate

on:
  pull_request:
    paths:
      - "**/Dockerfile"
      - "**/structure-test.yaml"
      - ".github/workflows/validate.yml"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.images }}
      has_images: ${{ steps.images.outputs.has_images }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: images
        shell: bash
        run: |
          # generate the image list
          # only rebuild and test modified oci-images
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          if [[ -n "$BASE_SHA" ]]; then
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          else
            CHANGED=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA")
          fi
          DIRS=$(
            printf '%s\n' "${CHANGED:-}" \
            | awk -F/ 'NF > 1 {print $1}' \
            | sort -u \
            | while read -r d; do
                test -f "$d/Dockerfile" && echo "$d"
              done || true
          )
          IMAGES=$(
            printf '%s\n' "${DIRS:-}" \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
              '
          )
          if [[ "$IMAGES" == "[]" ]]; then
            echo 'images=["__none__"]' >> "$GITHUB_OUTPUT"
            echo 'has_images=false' >> "$GITHUB_OUTPUT"
          else
            echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
            echo 'has_images=true' >> "$GITHUB_OUTPUT"
          fi
          echo "Images: $IMAGES"

  structure-test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}

    steps:
      - name: No OCI images changed
        if: matrix.image == '__none__'
        run: echo "Nothing to validate"

      - uses: actions/checkout@v6
        if: matrix.image != '__none__'

      - name: Build image
        if: matrix.image != '__none__'
        run: |
          test -n "${{ matrix.image }}"
          echo '${{ needs.discover.outputs.images }}'
          IMAGE_NAME=$(basename "${{ matrix.image }}")
          docker build \
            -t local/${IMAGE_NAME}:test \
            ${{ matrix.image }}

      - name: Install Container Structure Test
        if: matrix.image != '__none__'
        run: |
          VERSION=1.22.1
          curl -fsSL \
            -o container-structure-test \
            https://github.com/GoogleContainerTools/container-structure-test/releases/download/v${VERSION}/container-structure-test-linux-amd64
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/

      - name: Run Container Structure Test
        if: matrix.image != '__none__'
        run: |
          IMAGE_NAME=$(basename "${{ matrix.image }}")
          container-structure-test test \
            --image local/${IMAGE_NAME}:test \
            --config ${{ matrix.image }}/structure-test.yaml
